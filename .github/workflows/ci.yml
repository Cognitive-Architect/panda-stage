name: CI

on:
  push:
    branches:
      - main
      - 'chore/**'
      - 'feat/**'
      - 'fix/**'
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Day 13 recovery renderer gate
        run: pnpm verify:day13

      - name: Day 14 recent-project renderer gate
        run: pnpm verify:day14

      - name: M1 project lifecycle gate
        run: pnpm verify:m1
